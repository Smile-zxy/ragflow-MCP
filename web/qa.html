<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珂阳AI门户 - 智能问答</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-tertiary: #1a2235;
            --bg-card: #151d2e;
            --bg-hover: #1e2a42;
            --accent-primary: #3b82f6;
            --accent-secondary: #60a5fa;
            --accent-glow: #2563eb;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --border-light: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-glow));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Datasets Section */
        .datasets-section {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            max-height: 200px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .datasets-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .refresh-datasets {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .refresh-datasets:hover {
            background: var(--bg-hover);
            color: var(--accent-primary);
        }

        .refresh-datasets svg {
            width: 14px;
            height: 14px;
        }

        .datasets-list {
            overflow-y: auto;
            flex: 1;
        }

        .datasets-loading, .datasets-empty, .datasets-error {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 12px;
        }

        .datasets-error {
            color: var(--error);
        }

        .dataset-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .dataset-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .dataset-item.active {
            background: var(--bg-tertiary);
            color: var(--accent-primary);
            border-left: 2px solid var(--accent-primary);
        }

        .dataset-item svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* Documents Section - Files in Knowledge Base */
        .documents-section {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            max-height: 250px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: max-height 0.3s ease;
        }

        .documents-section.hidden {
            display: none;
        }

        .documents-section.collapsed {
            max-height: 40px !important;
            overflow: hidden;
        }

        .documents-section.collapsed .documents-list {
            display: none !important;
        }

        .documents-section.collapsed .documents-header {
            margin-bottom: 0 !important;
        }

        #documentsToggleIcon.collapsed {
            transform: rotate(-90deg);
        }

        .documents-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .documents-actions {
            display: flex;
            gap: 4px;
        }

        .toggle-documents, .refresh-documents {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .toggle-documents:hover, .refresh-documents:hover {
            background: var(--bg-hover);
            color: var(--accent-primary);
        }

        .toggle-documents {
            transition: transform 0.3s ease;
        }

        .refresh-documents svg {
            width: 14px;
            height: 14px;
        }

        .documents-list {
            overflow-y: auto;
            flex: 1;
        }

        .documents-loading, .documents-empty, .documents-error {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 12px;
        }

        .documents-error {
            color: var(--error);
        }

        .document-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .document-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .document-item svg {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
            color: var(--text-muted);
        }

        .dataset-item-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Chat History */
        .chat-history {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            max-height: 280px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 0 4px;
        }

        .chat-history-header span {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clear-history {
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            color: var(--text-muted);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .clear-history:hover {
            background: var(--bg-hover);
            color: var(--error);
        }

        .clear-history svg {
            width: 14px;
            height: 14px;
        }

        .chat-history-list {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            border-color: var(--accent-primary);
            background: var(--bg-hover);
        }

        .history-item:last-child {
            margin-bottom: 0;
        }

        .history-question {
            font-size: 12px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .history-meta {
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-context {
            color: var(--accent-secondary);
        }

        .history-empty {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 16px;
        }

        /* Sidebar Footer - User Profile */
        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-tertiary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-profile:hover {
            background: var(--bg-hover);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Navigation */
        .nav-menu {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
            max-height: calc(100vh - 320px);
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 0 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-section-title .refresh-chats {
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px;
            border-radius: 4px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-section-title .refresh-chats:hover {
            background: var(--bg-hover);
            color: var(--accent-primary);
        }

        .nav-section-title .refresh-chats svg {
            width: 12px;
            height: 12px;
        }

        .chats-loading, .chats-empty, .chats-error {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            padding: 12px;
        }

        .chats-error {
            color: var(--error);
        }

        .chat-nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .chat-nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .chat-nav-item.active {
            background: var(--bg-tertiary);
            color: var(--accent-primary);
            border-left: 3px solid var(--accent-primary);
        }

        .chat-nav-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .chat-nav-item-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            font-size: 14px;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-secondary);
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .nav-item .count {
            margin-left: auto;
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Topbar */
        .topbar {
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 24px;
        }

        .current-context {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-context-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .current-context-icon svg {
            width: 18px;
            height: 18px;
            color: white;
        }

        .current-context-info {
            display: flex;
            flex-direction: column;
        }

        .current-context-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .current-context-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Main area with sidebar + chat + FAQ */
        .main-area {
            flex: 1;
            display: flex;
            margin-left: 240px;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 24px;
        }

        /* FAQ Section (inline) */
        .faq-section {
            display: flex;
            flex-direction: column;
            margin-bottom: 16px;
        }

        .faq-section.hidden {
            display: none;
        }

        .faq-header-inline {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .faq-header-inline svg {
            width: 16px;
            height: 16px;
            color: var(--accent-primary);
        }

        .faq-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .faq-item {
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            max-width: 45%;
        }

        .faq-item:hover {
            border-color: var(--accent-primary);
            background: var(--bg-hover);
        }

        .faq-item-question {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .faq-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        .faq-empty-text {
            font-size: 13px;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-glow));
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        .message-avatar svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        .message-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .message.user .message-content {
            background: var(--bg-tertiary);
            border-color: var(--border-light);
        }

        .message-content p {
            margin-bottom: 8px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content ul {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-content li {
            margin-bottom: 4px;
        }

        .message-content code {
            background: var(--bg-hover);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Space Grotesk', monospace;
            font-size: 13px;
        }

        /* Input Area */
        .input-area {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-top: auto;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
            min-height: 52px;
            max-height: 150px;
            line-height: 1.5;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-glow));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
            color: white;
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .empty-state-icon svg {
            width: 40px;
            height: 40px;
            color: var(--accent-primary);
        }

        .empty-state-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state-desc {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 300px;
        }

        /* Context hint */
        .context-hint {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--accent-secondary);
        }

        .context-hint svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }

        /* Loading */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        /* Prominent nav item (New Employee Training) */
        .nav-item.prominent {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(219, 39, 119, 0.1));
            border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .nav-item.prominent:hover {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(219, 39, 119, 0.15));
            border-color: rgba(236, 72, 153, 0.5);
        }

        .nav-item.prominent.active {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.25), rgba(219, 39, 119, 0.2));
            border-color: #ec4899;
        }

        .nav-badge {
            margin-left: auto;
            background: linear-gradient(135deg, #ec4899, #db2777);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 0.5px;
        }

        /* Selected indicator */
        .nav-item.active::before {
            content: '';
            position: absolute;

            max-height: 2000px !important;

            background: var(--bg-hover) !important;
            border-color: var(--border-light) !important;
            color: var(--text-primary) !important;
        }

</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <nav class="nav-menu">

                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>

                    </div>

            <!-- RAGFlow Datasets -->

                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6"/>
                            <path d="M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                    </button>
                </div>
                <div class="datasets-list" id="datasetsList">
                    <div class="datasets-loading">加载中...</div>
                </div>
            </div>

            <!-- Documents in Knowledge Base -->
            <div class="documents-section" id="documentsSection">
                <div class="documents-header">
                    <span>知识库文件</span>
                    <div class="documents-actions">
                        <button class="toggle-documents" title="收起/展开" onclick="toggleDocuments()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="documentsToggleIcon">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </button>
                        <button class="refresh-documents" title="刷新" onclick="loadDocuments()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 4v6h-6"/>
                                <path d="M1 20v-6h6"/>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="documents-list" id="documentsList">
                    <div class="documents-loading">请选择一个知识库</div>
                </div>
            </div>

            <!-- Chat History -->
            <div class="chat-history">
                <div class="chat-history-header">
                    <span>问答历史</span>
                    <button class="clear-history" title="清空历史">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                </div>
                <div class="chat-history-list" id="chatHistoryList">
                    <div class="history-empty">暂无问答记录</div>
                </div>
            </div>

            <!-- User Profile -->
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">张</div>
                    <div class="user-info">
                        <div class="user-name">张明</div>
                        <div class="user-role">MES产品部</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="current-context">
                    <div class="current-context-icon" id="contextIcon" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                        </svg>
                    </div>
                    <div class="current-context-info">
                        <span class="current-context-label">当前上下文</span>
                        <span class="current-context-name" id="contextName">MES制造执行系统</span>
                    </div>
                </div>
            </header>

            <div class="main-area">
                <!-- Chat Container -->
                <div class="chat-container">
                    <!-- Empty State -->
                    <div class="empty-state" id="emptyState">
                        <div class="empty-state-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            </svg>
                        </div>
                        <h3 class="empty-state-title">开始智能问答</h3>
                        <p class="empty-state-desc">选择左侧的产品或项目，我将根据您选择的内容为您提供专属的智能问答服务</p>
                    </div>

                    <!-- Chat Messages -->
                    <div class="chat-messages" id="chatMessages" style="display: none;">
                        <!-- Messages will be added here -->
                    </div>

                    <!-- FAQ Section (above input) -->
                    <div class="faq-section" id="faqSection">
                        <div class="faq-header-inline">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                                <line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                            <span>常见问题</span>
                        </div>
                        <div class="faq-list" id="faqList">
                            <!-- FAQ items will be dynamically added -->
                        </div>
                    </div>

                    <!-- Input Area -->
                    <div class="input-area">
                        <div class="input-wrapper">
                            <textarea class="chat-input" id="chatInput" placeholder="输入您的问题..." rows="1"></textarea>
                            <button class="send-btn" id="sendBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"/>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // RAGFlow Datasets
        let datasets = [];
        let selectedDatasetId = null;
        let datasetMessages = {}; // Store messages for each dataset separately

        // RAGFlow Agents (Canvas)
        let agents = [];
        let currentAgentId = null;
        let agentMessages = {}; // Store messages for each agent separately

        // RAGFlow Chats
        let chats = [];
        let currentChatId = null;

        // Load agents from RAGFlow /v1/canvas API
        async function loadAgents() {
            const chatsList = document.getElementById('chatsList');
            chatsList.innerHTML = '<div class="chats-loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/canvas`);
                const data = await response.json();

                if (data.success && data.data) {
                    agents = data.data;
                    renderAgents();
                } else {
                    chatsList.innerHTML = `<div class="chats-error">${data.error || '获取智能体失败'}</div>`;
                }
            } catch (error) {
                console.error('Failed to load agents:', error);
                chatsList.innerHTML = '<div class="chats-error">无法连接到服务器</div>';
            }
        }

        // Render agents to sidebar
        function renderAgents() {
            const chatsList = document.getElementById('chatsList');

            if (agents.length === 0) {
                chatsList.innerHTML = '<div class="chats-empty">暂无智能体</div>';
                return;
            }

            chatsList.innerHTML = agents.map(agent => `
                <div class="chat-nav-item ${agent.id === currentAgentId ? 'active' : ''}"
                     data-id="${agent.id}"
                     data-name="${agent.name}"
                     onclick="selectAgent('${agent.id}', '${agent.name}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4"/>
                        <path d="M12 8h.01"/>
                    </svg>
                    <span class="chat-nav-item-name" title="${agent.name}">${agent.name}</span>
                </div>
            `).join('');
        }

        // Select an agent and switch to that agent's session
        async function selectAgent(id, name) {
            currentAgentId = id;
            currentContext = {
                type: 'agent',
                id: id,
                name: name,
                icon: 'agent'
            };
            renderAgents();

            // Update context display
            if (contextName) contextName.textContent = name;
            if (contextHintText) contextHintText.textContent = '切换到智能体会话';

            // Load agent's message history
            loadAgentMessages(id);

            // Call backend to set current agent and create/fetch session
            try {
                const response = await fetch(`${API_BASE_URL}/api/canvas/set`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ agent_id: id })
                });
                const result = await response.json();
                if (result.success && result.chat_id) {
                    currentChatId = result.chat_id;
                }
            } catch (error) {
                console.error('Failed to set current agent:', error);
            }

            console.log('Selected agent:', name);
        }

        // Load and display messages for a specific agent
        function loadAgentMessages(agentId) {
            chatMessages.innerHTML = '';

            if (agentMessages[agentId] && agentMessages[agentId].length > 0) {
                // Show chat UI and load messages
                emptyState.style.display = 'none';
                chatMessages.style.display = 'flex';
                if (contextHint) contextHint.style.display = 'flex';
                hasStartedChat = true;
                faqSection.classList.add('hidden');

                // Render all messages for this agent
                agentMessages[agentId].forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.type}`;

                    const iconHtml = msg.type === 'ai'
                        ? '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'
                        : '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>';

                    let refHtml = '';
                    if (msg.references && msg.references.length > 0) {
                        const refItems = msg.references.map((ref, i) => `
                            <div style="background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;padding:10px 14px;margin-bottom:8px;">
                                <div style="font-size:12px;color:var(--accent-secondary);margin-bottom:4px;font-weight:500;">📄 ${ref.source || 'Unknown'}</div>
                                <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap;">${(ref.content || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                            </div>
                        `).join('');

                        refHtml = `
                            <div class="ref-toggle" style="margin-top:14px;">
                                <div onclick="this.parentElement.classList.toggle('open')" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:6px;font-size:13px;color:var(--text-secondary);user-select:none;transition:all 0.2s;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform 0.2s;" class="ref-arrow"><polyline points="6 9 12 15 18 9"/></svg>
                                    <span>参考来源 (${msg.references.length})</span>
                                </div>
                                <div class="ref-content" style="max-height:0;overflow:hidden;transition:max-height 0.3s ease;margin-top:0;">
                                    <div style="padding-top:10px;">${refItems}</div>
                                </div>
                            </div>
                        `;
                    }

                    const formattedContent = msg.type === 'ai' ? formatContent(msg.content) : msg.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>');

                    messageDiv.innerHTML = `
                        <div class="message-avatar">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconHtml}</svg>
                        </div>
                        <div class="message-content">
                            ${formattedContent}
                            ${refHtml}
                        </div>
                    `;

                    chatMessages.appendChild(messageDiv);
                });

                chatMessages.scrollTop = chatMessages.scrollHeight;
            } else {
                // No history, show empty state
                emptyState.style.display = 'flex';
                chatMessages.style.display = 'none';
                if (contextHint) contextHint.style.display = 'none';
                hasStartedChat = false;
                faqSection.classList.remove('hidden');
            }
        }

        // Load datasets from API
        async function loadDatasets() {
            const datasetsList = document.getElementById('datasetsList');
            datasetsList.innerHTML = '<div class="datasets-loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/datasets`);
                const data = await response.json();

                if (data.success && data.data) {
                    datasets = data.data;
                    renderDatasets();
                } else {
                    datasetsList.innerHTML = `<div class="datasets-error">${data.error || '获取知识库失败'}</div>`;
                }
            } catch (error) {
                console.error('Failed to load datasets:', error);
                datasetsList.innerHTML = '<div class="datasets-error">无法连接到服务器</div>';
            }
        }

        // Render datasets to sidebar
        function renderDatasets() {
            const datasetsList = document.getElementById('datasetsList');

            if (datasets.length === 0) {
                datasetsList.innerHTML = '<div class="datasets-empty">暂无知识库</div>';
                return;
            }

            datasetsList.innerHTML = datasets.map(ds => `
                <div class="dataset-item ${ds.id === selectedDatasetId ? 'active' : ''}"
                     data-id="${ds.id}"
                     data-name="${ds.name}"
                     onclick="selectDataset('${ds.id}', '${ds.name}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span class="dataset-item-name" title="${ds.name}">${ds.name}</span>
                </div>
            `).join('');
        }

        // Select a dataset
        function selectDataset(id, name) {
            selectedDatasetId = id;
            renderDatasets();

            // Load dataset's message history
            loadDatasetMessages(id);

            // Show documents section and load documents
            const documentsSection = document.getElementById('documentsSection');
            documentsSection.classList.remove('hidden');
            loadDocuments();

            console.log('Selected dataset:', name);
        }

        // Load and display messages for a specific dataset
        function loadDatasetMessages(datasetId) {
            chatMessages.innerHTML = '';

            if (datasetMessages[datasetId] && datasetMessages[datasetId].length > 0) {
                // Show chat UI and load messages
                emptyState.style.display = 'none';
                chatMessages.style.display = 'flex';
                if (contextHint) contextHint.style.display = 'flex';
                hasStartedChat = true;
                faqSection.classList.add('hidden');

                // Render all messages for this dataset
                datasetMessages[datasetId].forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.type}`;

                    const iconHtml = msg.type === 'ai'
                        ? '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>'
                        : '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>';

                    let refHtml = '';
                    if (msg.references && msg.references.length > 0) {
                        const refItems = msg.references.map((ref, i) => `
                            <div style="background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;padding:10px 14px;margin-bottom:8px;">
                                <div style="font-size:12px;color:var(--accent-secondary);margin-bottom:4px;font-weight:500;">📄 ${ref.source || 'Unknown'}</div>
                                <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap;">${(ref.content || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                            </div>
                        `).join('');

                        refHtml = `
                            <div class="ref-toggle" style="margin-top:14px;">
                                <div onclick="this.parentElement.classList.toggle('open')" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:6px;font-size:13px;color:var(--text-secondary);user-select:none;transition:all 0.2s;">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform 0.2s;" class="ref-arrow"><polyline points="6 9 12 15 18 9"/></svg>
                                    <span>参考来源 (${msg.references.length})</span>
                                </div>
                                <div class="ref-content" style="max-height:0;overflow:hidden;transition:max-height 0.3s ease;margin-top:0;">
                                    <div style="padding-top:10px;">${refItems}</div>
                                </div>
                            </div>
                        `;
                    }

                    const formattedContent = msg.type === 'ai' ? formatContent(msg.content) : msg.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>');

                    messageDiv.innerHTML = `
                        <div class="message-avatar">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconHtml}</svg>
                        </div>
                        <div class="message-content">
                            ${formattedContent}
                            ${refHtml}
                        </div>
                    `;

                    chatMessages.appendChild(messageDiv);
                });

                chatMessages.scrollTop = chatMessages.scrollHeight;
            } else {
                // No history, show empty state
                emptyState.style.display = 'flex';
                chatMessages.style.display = 'none';
                if (contextHint) contextHint.style.display = 'none';
                hasStartedChat = false;
                faqSection.classList.remove('hidden');
            }
        }

        // Load documents from API
        let documents = [];
        // Toggle documents section collapse/expand
        function toggleDocuments() {
            const section = document.getElementById('documentsSection');
            const icon = document.getElementById('documentsToggleIcon');
            if (section && icon) {
                section.classList.toggle('collapsed');
                icon.classList.toggle('collapsed');
            }
        }

        async function loadDocuments() {
            if (!selectedDatasetId) return;

            const documentsSection = document.getElementById('documentsSection');
            const documentsList = document.getElementById('documentsList');
            
            // Ensure expanded when loading
            if (documentsSection) {
                documentsSection.classList.remove('collapsed');
            }
            const toggleIcon = document.getElementById('documentsToggleIcon');
            if (toggleIcon) {
                toggleIcon.classList.remove('collapsed');
            }
            
            if (!documentsList) return;
            documentsList.innerHTML = '<div class="documents-loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/datasets/${selectedDatasetId}/documents`);
                const data = await response.json();

                if (data.success && data.data) {
                    documents = data.data;
                    renderDocuments();
                } else {
                    documentsList.innerHTML = `<div class="documents-error">${data.error || '获取文件失败'}</div>`;
                }
            } catch (error) {
                console.error('Failed to load documents:', error);
                documentsList.innerHTML = '<div class="documents-error">无法连接到服务器</div>';
            }
        }

        // Render documents to sidebar
        function renderDocuments() {
            const documentsList = document.getElementById('documentsList');

            if (documents.length === 0) {
                documentsList.innerHTML = '<div class="documents-empty">暂无文件</div>';
                return;
            }

            documentsList.innerHTML = documents.map(doc => `
                <div class="document-item" title="${doc.name}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span class="document-item-name" title="${doc.name}">${doc.name}</span>
                </div>
            `).join('');
        }

        // Load chats from API
        async function loadChats() {
            const chatsList = document.getElementById('chatsList');
            chatsList.innerHTML = '<div class="chats-loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/chats`);
                const data = await response.json();

                if (data.success && data.data) {
                    chats = data.data;
                    renderChats();
                } else {
                    chatsList.innerHTML = `<div class="chats-error">${data.error || '获取会话失败'}</div>`;
                }
            } catch (error) {
                console.error('Failed to load chats:', error);
                chatsList.innerHTML = '<div class="chats-error">无法连接到服务器</div>';
            }
        }

        // Render chats to sidebar
        function renderChats() {
            const chatsList = document.getElementById('chatsList');

            if (chats.length === 0) {
                chatsList.innerHTML = '<div class="chats-empty">暂无会话</div>';
                return;
            }

            chatsList.innerHTML = chats.map(chat => `
                <div class="chat-nav-item ${chat.id === currentChatId ? 'active' : ''}"
                     data-id="${chat.id}"
                     data-name="${chat.name}"
                     onclick="selectChat('${chat.id}', '${chat.name}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span class="chat-nav-item-name" title="${chat.name}">${chat.name}</span>
                </div>
            `).join('');
        }

        // Select a chat
        async function selectChat(id, name) {
            currentChatId = id;
            currentContext = {
                type: 'chat',
                id: id,
                name: name,
                icon: 'chat'
            };
            renderChats();

            // Update context display
            if (contextName) contextName.textContent = name;
            if (contextHintText) contextHintText.textContent = '切换到新会话';

            // Call backend to set current chat
            try {
                await fetch(`${API_BASE_URL}/api/chats/set`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: id })
                });
            } catch (error) {
                console.error('Failed to set current chat:', error);
            }

            console.log('Selected chat:', name);
        }

        // State
        let currentContext = {

        // Call RAGFlow Chat API to get AI summary + references
        async function fetchAnswer(question) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: question })
                });
                const data = await response.json();
                if (data.success) {
                    return { answer: data.answer || '暂无回答。', references: data.references || [] };
                } else {
                    return { answer: data.error || '抱歉，检索知识库时出现错误，请稍后再试。', references: [] };
                }
            } catch (error) {
                console.error('API call failed:', error);
                return { answer: '抱歉，无法连接到后端服务，请确认API服务已启动。', references: [] };
            }
        }

        // Format answer content: convert markdown-like text to HTML
        function formatContent(text) {
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^### (.*$)/gm, '<h4 style="margin:12px 0 6px;color:var(--accent-secondary);">$1</h4>')
                .replace(/^## (.*$)/gm, '<h3 style="margin:14px 0 8px;color:var(--accent-secondary);">$1</h3>')
                .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border-color);margin:12px 0;">')
                .replace(/^\* (.*$)/gm, '<li style="margin-left:16px;">$1</li>')
                .replace(/^- (.*$)/gm, '<li style="margin-left:16px;">$1</li>')
                .replace(/\n/g, '<br>');
        }

            let refHtml = '';
            if (references && references.length > 0) {
                const refItems = references.map((ref, i) => `
                    <div style="background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;padding:10px 14px;margin-bottom:8px;">
                        <div style="font-size:12px;color:var(--accent-secondary);margin-bottom:4px;font-weight:500;">📄 ${ref.source || 'Unknown'}</div>
                        <div style="font-size:13px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap;">${(ref.content || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                    </div>
                `).join('');

                refHtml = `
                    <div class="ref-toggle" style="margin-top:14px;">
                        <div onclick="this.parentElement.classList.toggle('open')" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;padding:6px 12px;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:6px;font-size:13px;color:var(--text-secondary);user-select:none;transition:all 0.2s;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition:transform 0.2s;" class="ref-arrow"><polyline points="6 9 12 15 18 9"/></svg>
                            <span>参考来源 (${references.length})</span>
                        </div>
                        <div class="ref-content" style="max-height:0;overflow:hidden;transition:max-height 0.3s ease;margin-top:0;">
                            <div style="padding-top:10px;">${refItems}</div>
                        </div>
                    </div>
                `;
            }

            const formattedContent = type === 'ai' ? formatContent(content) : content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g, '<br>');

            messageDiv.innerHTML = `
                <div class="message-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${iconHtml}</svg>
                </div>
                <div class="message-content">
                    ${formattedContent}
                    ${refHtml}
                </div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Store message in agent or dataset specific history
            if (currentAgentId) {
                if (!agentMessages[currentAgentId]) {
                    agentMessages[currentAgentId] = [];

                agentMessages[currentAgentId].push({ type, content, references });
            }
            if (selectedDatasetId) {
                if (!datasetMessages[selectedDatasetId]) {
                    datasetMessages[selectedDatasetId] = [];
                }
                datasetMessages[selectedDatasetId].push({ type, content, references });
            }
